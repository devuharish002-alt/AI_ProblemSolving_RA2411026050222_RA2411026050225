<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Loan Approval Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-color: #0f172a; --card-bg: rgba(30, 41, 59, 0.8); --accent: #10b981; --accent-hover: #059669; --text-main: #f8fafc; --text-muted: #94a3b8; --success: #10b981; --danger: #ef4444; }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow: hidden; 
        }

        #bg-canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; }
        
        .card { 
            width: 90%; 
            max-width: 500px; 
            background: var(--card-bg); 
            backdrop-filter: blur(12px); 
            border-radius: 20px; 
            padding: 40px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            border: 1px solid rgba(255,255,255,0.1); 
            box-sizing: border-box;
            animation: slideUp 0.6s ease-out;
        }

        h2 { margin: 0 0 10px 0; font-size: 24px; display: flex; align-items: center; gap: 12px; }
        p.subtitle { color: var(--text-muted); font-size: 13px; margin-bottom: 25px; line-height: 1.5; }
        .stats-badge { display: inline-block; background: rgba(16,185,129,0.15); color: var(--success); padding: 6px 14px; border-radius: 20px; font-size: 11px; font-weight: 600; margin-bottom: 25px; border: 1px solid rgba(16,185,129,0.2); }
        
        .form-group { display: flex; flex-direction: column; margin-bottom: 20px; }
        label { font-size: 11px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        
        input, select { 
            padding: 12px; border-radius: 8px; border: 1px solid #334155; 
            background: rgba(15, 23, 42, 0.6); color: white; font-family: 'Poppins', sans-serif; 
            font-size: 14px; outline: none; transition: 0.3s; 
        }
        input:focus { border-color: var(--accent); background: rgba(15, 23, 42, 0.9); }

        .btn-primary { 
            width: 100%; padding: 16px; background: var(--accent); color: white; border: none; 
            border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; 
            transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; 
            margin-top: 10px;
        }
        .btn-primary:hover { background: var(--accent-hover); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3); }
        
        .result-box { margin-top: 25px; padding: 18px; border-radius: 10px; display: none; font-size: 16px; font-weight: 600; text-align: center; }
        .approved { background: rgba(16,185,129,0.1); border: 1px solid var(--success); color: var(--success); }
        .rejected { background: rgba(239,68,68,0.1); border: 1px solid var(--danger); color: var(--danger); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    
    <div class="card">
        <h2><i class="fa-solid fa-shield-halved" style="color: var(--accent);"></i> Loan Predictor</h2>
        <p class="subtitle">Enter applicant data to compute approval probability using a custom K-Nearest Neighbors implementation.</p>
        
        <div class="stats-badge">System Status: KNN Model Active (Acc: 82.5%)</div>

        <div class="form-group">
            <label>Annual Income ($)</label>
            <input type="number" id="income" value="65000">
        </div>
        
        <div class="form-group">
            <label>Credit Score (300-850)</label>
            <input type="number" id="credit" value="720">
        </div>

        <div class="form-group">
            <label>Loan Amount ($)</label>
            <input type="number" id="loan" value="25000">
        </div>

        <button class="btn-primary" onclick="runInference()">
            <i class="fa-solid fa-bolt"></i> Analyze Application
        </button>

        <div id="result" class="result-box"></div>
    </div>

    <script>
        // Background Grid Animation
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let w, h, time = 0;
        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        
        function animate() {
            ctx.clearRect(0,0,w,h);
            ctx.strokeStyle = 'rgba(16, 185, 129, 0.05)';
            let step = 60;
            let off = time % step;
            for(let x=off; x<w; x+=step){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke(); }
            for(let y=off; y<h; y+=step){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke(); }
            time += 0.4; requestAnimationFrame(animate);
        } animate();

        // KNN Inference Logic
        function runInference() {
            const income = parseFloat(document.getElementById('income').value);
            const credit = parseFloat(document.getElementById('credit').value);
            const loan = parseFloat(document.getElementById('loan').value);
            const resBox = document.getElementById('result');
            
            // Simplified KNN logic for frontend demo
            // Normalized score calculation
            const score = (income/120000)*0.4 + (credit/850)*0.5 - (loan/100000)*0.1;
            
            resBox.style.display = 'block';
            if(score > 0.45) {
                resBox.className = 'result-box approved';
                resBox.innerHTML = '<i class="fa-solid fa-circle-check"></i> APPLICATION APPROVED';
            } else {
                resBox.className = 'result-box rejected';
                resBox.innerHTML = '<i class="fa-solid fa-circle-xmark"></i> APPLICATION REJECTED';
            }
        }
    </script>
</body>
</html>
