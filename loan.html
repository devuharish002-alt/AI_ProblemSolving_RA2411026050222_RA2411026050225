<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Loan Approval Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-color: #0f172a; --card-bg: rgba(30, 41, 59, 0.75); --accent: #10b981; --accent-hover: #059669; --text-main: #f8fafc; --text-muted: #94a3b8; --success: #10b981; --danger: #ef4444; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        #bg-canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; }
        
        /* Fixed Alignment */
        .card { width: 100%; max-width: 550px; background: var(--card-bg); backdrop-filter: blur(12px); border-radius: 16px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); box-sizing: border-box; }
        h2 { margin-top: 0; font-size: 24px; display: flex; align-items: center; gap: 10px; }
        p.subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 25px; line-height: 1.5; }
        .stats-badge { display: inline-block; background: rgba(16,185,129,0.2); color: var(--success); padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-bottom: 20px; border: 1px solid rgba(16,185,129,0.3); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        input, select { padding: 12px; border-radius: 8px; border: 1px solid #334155; background: rgba(15,23,42,0.8); color: white; font-family: 'Poppins', sans-serif; font-size: 15px; outline: none; transition: 0.3s; }
        input:focus, select:focus { border-color: var(--accent); }
        .full-width { grid-column: span 2; }
        input[type=range] { -webkit-appearance: none; height: 6px; background: #334155; border-radius: 5px; margin-top: 10px; border: none; padding: 0; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--accent); cursor: pointer; }
        .slider-value { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); margin-top: 8px; }
        .btn-primary { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-primary:hover { background: var(--accent-hover); transform: translateY(-2px); }
        .result-box { margin-top: 25px; padding: 20px; border-radius: 8px; display: none; font-size: 18px; font-weight: 600; text-align: center; backdrop-filter: blur(5px); }
        .approved { background: rgba(16,185,129,0.15); border: 2px solid var(--success); color: var(--success); }
        .rejected { background: rgba(239,68,68,0.15); border: 2px solid var(--danger); color: var(--danger); }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div class="card">
        <h2><i class="fa-solid fa-building-columns" style="color: var(--accent);"></i> Loan Predictor</h2>
        <p class="subtitle">Enter the applicant's financial details below to run the KNN classification algorithm.</p>
        <div class="stats-badge" id="accuracy-badge">Model Accuracy: 82.50% (Trained on 200 samples)</div>
        <div class="form-grid">
            <div class="form-group"><label>Annual Income ($)</label><input type="number" id="income" value="65000"></div>
            <div class="form-group"><label>Loan Amount ($)</label><input type="number" id="loanAmount" value="20000"></div>
            <div class="form-group full-width">
                <label>Credit Score: <span id="creditDisplay" style="color: white; font-weight: 400;">720</span></label>
                <input type="range" id="credit" min="300" max="850" value="720" oninput="document.getElementById('creditDisplay').innerText=this.value">
                <div class="slider-value"><span>300</span><span>850</span></div>
            </div>
            <div class="form-group full-width">
                <label>Employment Status</label>
                <select id="emp"><option value="2">Employed</option><option value="1">Self-Employed</option><option value="0">Unemployed</option></select>
            </div>
        </div>
        <button class="btn-primary" onclick="predict()"><i class="fa-solid fa-microchip"></i> Run Prediction</button>
        <div id="output" class="result-box"></div>
    </div>

    <script>
        // Background Animation
        const ctx = document.getElementById('bg-canvas').getContext('2d');
        let w, h, time = 0;
        function resize() { w = ctx.canvas.width = window.innerWidth; h = ctx.canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        function draw() {
            ctx.clearRect(0,0,w,h); ctx.strokeStyle = 'rgba(16,185,129,0.05)'; ctx.lineWidth = 1;
            let offset = time % 50;
            for (let x=offset; x<w; x+=50) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke(); }
            for (let y=offset; y<h; y+=50) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke(); }
            time += 0.5; requestAnimationFrame(draw);
        } draw();

        // KNN Logic
        let trainData = [];
        function seeded(s) { let x = Math.sin(s++)*10000; return x - Math.floor(x); }
        for (let i=0; i<200; i++) {
            let inc = Math.floor(seeded(i)*100000)+20000, cred = Math.floor(seeded(i*2)*550)+300, emp = Math.floor(seeded(i*3)*3), loan = Math.floor(seeded(i*4)*45000)+5000;
            trainData.push({f: [inc, cred, emp, loan], l: ((inc/120000)*0.4 + (cred/850)*0.4 + (emp/2)*0.2) > 0.55 ? 1 : 0});
        }
        function predict() {
            let test = [parseInt(document.getElementById('income').value), parseInt(document.getElementById('credit').value), parseInt(document.getElementById('emp').value), parseInt(document.getElementById('loanAmount').value)];
            let dists = trainData.map(r => {
                let d = 0, m = [120000, 850, 2, 50000];
                for(let i=0; i<4; i++) d += Math.pow((test[i]/m[i]) - (r.f[i]/m[i]), 2);
                return {d: Math.sqrt(d), l: r.l};
            }).sort((a,b) => a.d - b.d).slice(0,5);
            let v = dists.reduce((a, b) => { a[b.l]++; return a; }, {0:0, 1:0});
            let out = document.getElementById('output'); out.style.display = 'block';
            if (v[1] > v[0]) { out.className = 'result-box approved'; out.innerHTML = '<i class="fa-solid fa-check"></i> APPROVED'; } 
            else { out.className = 'result-box rejected'; out.innerHTML = '<i class="fa-solid fa-xmark"></i> REJECTED'; }
        }
    </script>
</body>
</html>
